<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>3D Шахматы — Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui">
        <h1>3D Шахматы</h1>
        <div id="status">Ход: Белые</div>
        <div id="timer">Время: 00:00</div>
        <div class="controls">
            <button id="btn-pvp" class="active" onclick="setMode('pvp')">Игрок vs Игрок</button>
            <button id="btn-pvc" onclick="setMode('pvc')">Игрок vs ПК</button>
        </div>
    </div>

    <div id="check-alert" class="hidden">ШАХ!</div>

    <div id="promotion-modal" class="hidden">
        <h3>Превращение пешки</h3>
        <p>Выберите фигуру:</p>
        <div class="promo-options">
            <button onclick="promotePawn('q')">Ферзь</button>
            <button onclick="promotePawn('r')">Ладья</button>
            <button onclick="promotePawn('b')">Слон</button>
            <button onclick="promotePawn('n')">Конь</button>
        </div>
    </div>

    <div id="game-over" class="hidden">
        <h2 id="end-title">Шах и мат!</h2>
        <h3 id="end-winner">Белые победили</h3>
        <div class="stats">
            <p>Всего ходов: <span id="stat-moves">0</span></p>
            <p>Алмазных ходов 💎: <span id="stat-diamond">0</span></p>
            <p>Длительность: <span id="stat-time">00:00</span></p>
        </div>
        <button id="btn-restart" onclick="location.reload()">Играть снова</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
